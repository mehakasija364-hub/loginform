<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<style>

body{
font-family: Arial;
background: linear-gradient(135deg,#667eea,#764ba2);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.box{
background:white;
padding:40px;
border-radius:10px;
width:300px;
text-align:center;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

input{
width:90%;
padding:10px;
margin:10px 0;
border-radius:5px;
border:1px solid #ccc;
}

button{
background:#667eea;
color:white;
border:none;
padding:10px;
width:100%;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#5a67d8;
}

a{
text-decoration:none;
color:#667eea;
}

</style>

</head>

<body>

<div class="box">

<h2>Login</h2>

<form method="POST">

<input type="text" name="username" placeholder="Username" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit">Login</button>

</form>

<br>

<a href="/register">Create Account</a>

</div>

</body>
</html>
